<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>IMAGE VIEWER | LEE JAESEO</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --sub-text: #94a3b8; --accent: #38bdf8; --border: #334155;
        }
        body.light-mode {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a;
            --accent: #0284c7; --border: #e2e8f0;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; }
        header {
            height: 60px; background: var(--card); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 30px;
        }
        .btn-nav {
            font-size: 0.75rem; font-weight: 700; padding: 6px 16px; border-radius: 50px;
            background: rgba(56, 189, 248, 0.1); color: var(--accent); border: 1px solid rgba(56, 189, 248, 0.2);
            cursor: pointer; transition: 0.2s; margin-left: 5px;
        }
        .btn-nav:hover { background: var(--accent); color: var(--card); }
        
        .viewer-main {
            height: calc(100vh - 60px); display: flex; justify-content: center; align-items: center;
            gap: 20px; padding: 40px; box-sizing: border-box;
        }
        .img-container {
            max-width: 48%; max-height: 100%; display: flex; justify-content: center;
        }
        img {
            max-width: 100%; max-height: 100%; object-fit: contain;
            border-radius: 4px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        body.light-mode img { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        body.single-mode #img-right { display: none; }
        body.single-mode .img-container { max-width: 85%; }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: 800; color: var(--accent);">IMAGE MODULE</div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <button class="btn-nav" id="prev-btn">PREV</button>
            <span id="page-info" style="font-weight: 600; font-size: 0.9rem; color: var(--sub-text);"></span>
            <button class="btn-nav" id="next-btn">NEXT</button>
            <button class="btn-nav" id="view-single">1 PAGE</button>
            <button class="btn-nav" id="view-spread">2 PAGES</button>
        </div>
        <div style="width: 100px;"></div>
    </header>

    <main class="viewer-main">
        <div class="img-container"><img id="img-left" src="" alt=""></div>
        <div class="img-container"><img id="img-right" src="" alt=""></div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileString = urlParams.get('files');
        const imageList = fileString ? fileString.split(',') : [];
        const theme = urlParams.get('theme');

        if (theme === 'light') document.body.classList.add('light-mode');

        let currentIndex = 0; // 배열 인덱스 (0부터 시작)
        let isSpread = true;

        function updateViewer() {
            const leftImg = document.getElementById('img-left');
            const rightImg = document.getElementById('img-right');
            const info = document.getElementById('page-info');

            // 이미지 경로 설정 (image-view/img/ 폴더 기준)
            leftImg.src = `./img/${imageList[currentIndex]}`;
            
            if (isSpread && currentIndex + 1 < imageList.length) {
                rightImg.src = `./img/${imageList[currentIndex + 1]}`;
                rightImg.style.display = 'block';
                info.textContent = `IMG ${currentIndex + 1}-${currentIndex + 2} / ${imageList.length}`;
            } else {
                rightImg.style.display = 'none';
                info.textContent = `IMG ${currentIndex + 1} / ${imageList.length}`;
            }
            updateActiveButton();
        }

        document.getElementById('next-btn').onclick = () => {
            const step = isSpread ? 2 : 1;
            if (currentIndex + step < imageList.length) {
                currentIndex += step;
                updateViewer();
            }
        };

        document.getElementById('prev-btn').onclick = () => {
            const step = isSpread ? 2 : 1;
            if (currentIndex - step >= 0) {
                currentIndex -= step;
                updateViewer();
            }
        };

        document.getElementById('view-single').onclick = () => {
            isSpread = false;
            document.body.classList.add('single-mode');
            updateViewer();
        };

        document.getElementById('view-spread').onclick = () => {
            isSpread = true;
            if (currentIndex % 2 !== 0) currentIndex -= 1;
            document.body.classList.remove('single-mode');
            updateViewer();
        };

        function updateActiveButton() {
            document.getElementById('view-single').style.background = isSpread ? 'rgba(56, 189, 248, 0.1)' : 'var(--accent)';
            document.getElementById('view-single').style.color = isSpread ? 'var(--accent)' : 'var(--card)';
            document.getElementById('view-spread').style.background = isSpread ? 'var(--accent)' : 'rgba(56, 189, 248, 0.1)';
            document.getElementById('view-spread').style.color = isSpread ? 'var(--card)' : 'var(--accent)';
        }

        if (imageList.length > 0) updateViewer();

// 리더기 페이지 
        const viewerMain = document.querySelector('.viewer-main');

        viewerMain.addEventListener('click', (e) => {
            // 1. 클릭한 위치의 가로 좌표(x)와 컨테이너 너비(width)를 가져옵니다.
            const x = e.clientX;
            const width = window.innerWidth;

            // 2. 왼쪽 절반 클릭 시 '이전', 오른쪽 절반 클릭 시 '다음'
            if (x < width / 2) {
                document.getElementById('prev-page')?.click(); // 기존 버튼 클릭 강제 실행
                document.getElementById('prev-btn')?.click();  // 이미지 뷰어용
            } else {
                document.getElementById('next-page')?.click(); // 기존 버튼 클릭 강제 실행
                document.getElementById('next-btn')?.click();  // 이미지 뷰어용
            }
        });

        // 💡 보너스: 커서 모양 바꾸기 (UX 디테일)
        viewerMain.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const width = window.innerWidth;
            viewerMain.style.cursor = x < width / 2 ? 'w-resize' : 'e-resize';
        });
    </script>
</body>
</html>
